<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panou Administrare - Programări</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        h1 {
            color: #d63384;
        }

        .table-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,.1);
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Programările Salonului Glamour Studio
    </h1>

    <div class="table-container">

        <table class="table table-bordered table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Nume</th>
                    <th>Telefon</th>
                    <th>Email</th>
                    <th>Serviciu</th>
                    <th>Data</th>
                    <th>Ora</th>
                    <th>Creat la</th>
                </tr>
            </thead>

            <tbody id="appointmentsTable">
            </tbody>

        </table>

    </div>

</div>

<script>
fetch("api/programari.json")
    .then(response => response.json())
    .then(programari => {

        const table = document.getElementById("appointmentsTable");

        if (programari.length === 0) {

            table.innerHTML = `
                <tr>
                    <td colspan="8" class="text-center">
                        Nu există programări.
                    </td>
                </tr>
            `;

            return;
        }

        programari.forEach((programare, index) => {

            table.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${programare.nume}</td>
                    <td>${programare.telefon}</td>
                    <td>${programare.email || "-"}</td>
                    <td>${programare.serviciu}</td>
                    <td>${programare.data}</td>
                    <td>${programare.ora}</td>
                    <td>${programare.creat_la}</td>
                </tr>
            `;

        });

    })
    .catch(error => {

        console.error(error);

        document.getElementById("appointmentsTable").innerHTML = `
            <tr>
                <td colspan="8" class="text-danger text-center">
                    Eroare la încărcarea programărilor.
                </td>
            </tr>
        `;

    });
</script>

</body>
</html>
